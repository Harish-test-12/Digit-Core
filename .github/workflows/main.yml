name: Build Pipeline
on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
    inputs:
      folder:
        description: 'Select the folder which contains your services'
        required: true
        type: choice
        options:
          - core-services
          - business-services
      serviceName:
        description: 'Provide the service name you want to build'
        required: true
      dbMigration:
        description: Enable if you require DB migration for this service
        required: true
        type: boolean

jobs:
  Build:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps: 
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Extract branch name and commit hash
        id: build_image_tag
        run: |
          # Extract the branch name from GITHUB_REF
          BRANCH=${GITHUB_REF##*/}  
          # Get the short commit hash
          COMMIT_HASH=$(git rev-parse --short HEAD)  
          
          # Add debugging to ensure these variables are not empty
          echo "Branch: $BRANCH"
          echo "Commit Hash: $COMMIT_HASH"
          
          # Set fallback values if the variables are empty
          if [ -z "$BRANCH" ]; then
            BRANCH="default-branch"
          fi
          if [ -z "$COMMIT_HASH" ]; then
            COMMIT_HASH="no-commit"
          fi
          
          # Build the image tag
          IMAGE_TAG="${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.serviceName }}:${BRANCH}-${COMMIT_HASH}-${{ github.run_number }}"
          
          echo "Image Tag: $IMAGE_TAG"
          
          # Export the image tag for use in other steps
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          
          # Set the output value for later jobs
          echo "::set-output name=tag::$IMAGE_TAG"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/maven/Dockerfile
          push: true
          tags: ${{ steps.build_image_tag.outputs.tag }}
          build-args: WORK_DIR=${{ github.event.inputs.folder }}/${{ github.event.inputs.serviceName }}
        
      - name: DB Build and push
        if: ${{ github.event.inputs.dbMigration }} 
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.event.inputs.folder }}/${{ github.event.inputs.serviceName }}/src/main/resources/db
          file: ${{ github.event.inputs.folder }}/${{ github.event.inputs.serviceName }}/src/main/resources/db/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.serviceName }}-db:${{ env.BRANCH }}-${{ env.COMMIT_HASH }}-${{ github.run_number }}

  VerifyImage:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull the built Docker image
        run: |
          echo "Pulling the Docker image..."
          docker pull ${{ needs.Build.outputs.docker_image_tag }}

      - name: Display Docker images
        run: |
          echo "Listing all Docker images..."
          docker images

      - name: Inspect the built Docker image
        run: |
          echo "Inspecting the Docker image..."
          docker image inspect ${{ needs.Build.outputs.docker_image_tag }}
