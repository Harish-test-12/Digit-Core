name: Build and push

on:
  push:
    branches: ['master']

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    env:
      service_name: "testjodejsapp"  # Define the service name here
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: harish7303/testjodejsapp
      
      - name: Build and push Docker image (First Service)
        uses: docker/build-push-action@v4
        with:
          context: business-services/build/maven
          file: business-services/build/maven/Dockerfile
          push: true
          tags: harish7303/testjodejsapp:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (Second Service)
        uses: docker/build-push-action@v4
        with:
          context: business-services/${{ env.service_name }}
          file: business-services/${{ env.service_name }}/Dockerfile
          push: true
          tags: harish7303/${{ env.service_name }}:latest
          labels: ${{ steps.meta.outputs.labels }}
