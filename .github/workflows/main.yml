name: Build Pipeline
on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
    inputs:
      folder:
        description: 'Select the folder which contains your services'
        required: true
        type: choice
        options:
          - core-services
          - business-services
      serviceName:
        description: 'Provide the service name you want to build'
        required: true
      dbMigration:
        description: Enable if you require DB migration for this service
        required: true
        type: boolean

jobs:
  Build:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Extract branch name and commit hash
        id: tag
        run: |
          BRANCH=${GITHUB_REF##*/}
          COMMIT_HASH=$(git rev-parse --short HEAD)
          
          # Fallback values in case variables are empty
          [ -z "$BRANCH" ] && BRANCH="default-branch"
          [ -z "$COMMIT_HASH" ] && COMMIT_HASH="no-commit"

          IMAGE_TAG=${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.serviceName }}:$BRANCH-$COMMIT_HASH-${{ github.run_number }}
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "::set-output name=image_tag::$IMAGE_TAG"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/maven/Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.image_tag }}
          build-args: WORK_DIR=${{ github.event.inputs.folder }}/${{ github.event.inputs.serviceName }}

      - name: DB Build and push
        if: ${{ github.event.inputs.dbMigration }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.event.inputs.folder }}/${{ github.event.inputs.serviceName }}/src/main/resources/db
          file: ${{ github.event.inputs.folder }}/${{ github.event.inputs.serviceName }}/src/main/resources/db/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.serviceName }}-db:${{ env.BRANCH }}-${{ env.COMMIT_HASH }}-${{ github.run_number }}

  FetchDockerImage:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Docker Image
        run: |
          echo "Pulling image: ${{ needs.Build.outputs.image_tag }}"
          docker pull ${{ needs.Build.outputs.image_tag }}

      - name: Inspect Docker Image
        run: |
          echo "Inspecting Docker image..."
          docker image inspect ${{ needs.Build.outputs.image_tag }}

      - name: List Docker Images
        run: |
          echo "Listing Docker images..."
          docker images
