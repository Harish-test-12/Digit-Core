name: Build and push

on:
  push:
    branches: ['master']

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Set up Docker Build Context
        id: set-context
        run: |
          # Extract the service name from the folder structure
          service_name=$(basename ${{ github.event.head_commit.message | tojson | fromjson }} | grep -oP '(?<=business-services/)[^/]*')
          echo "Service name: $service_name"
          echo "service_name=$service_name" >> $GITHUB_ENV
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: harish7303/${{ env.service_name }}name: Publish Docker image

on:
  push:
    branches: ['master']

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: harish7303/testjodejsapp
      
      - name: Build and push Docker image
        uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc
        with:
          context: business-services/build/maven
          dockerfile: business-services/build/maven/Dockerfile
          push: true
          tags: harish7303/testjodejsapp:latest
          labels: ${{ steps.meta.outputs.labels }}

      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: business-services/${{ env.service_name }}
          dockerfile: business-services/${{ env.service_name }}/Dockerfile
          push: true
          tags: harish7303/${{ env.service_name }}:latest
          labels: ${{ steps.meta.outputs.labels }}
