name: Build and push Docker images

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
    inputs:
      Folder:
        description: "Select the folder which contain your services"
        required: true
        # default: "billing-service"
      serviceName:
        description: 'Provide the service name you want to build'
        required: true
      # dbMigration:
      #   description: Enable if you require db migration to this service
      #   required: true
      #   type: boolean
        

jobs:
  determine_services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine-services.outputs.services }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Determine services
        id: determine-services
        run: |
          if [ "${{ github.event.inputs.services }}" != "" ]; then
            echo "Using provided services: ${{ github.event.inputs.services }}"
            echo "${{ github.event.inputs.services }}" | tr ',' '\n' | jq -R . | jq -s . > services.json
          else
            echo "Using default services: billing-service,collection-services"
            echo '["billing-service", "collection-services"]' > services.json
          if
          cat services.json
          echo "::set-output name=services::$(cat services.json)"
        shell: bash

  build_images:
    needs: determine_services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.determine_services.outputs.services) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: harish7303/${{ matrix.service }}

      - name: Build and push Docker image (Main Service)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: build/maven/Dockerfile
          push: true
          tags: harish7303/${{ matrix.service }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            WORK_DIR=business-services/${{ matrix.service }}

      - name: Build and push Docker image (DB Service)
        if: matrix.service == 'collection-services' || matrix.service == 'billing-service'
        uses: docker/build-push-action@v4
        with:
          context: business-services/${{ matrix.service }}/src/main/resources/db
          file: business-services/${{ matrix.service }}/src/main/resources/db/Dockerfile
          push: true
          tags: harish7303/${{ matrix.service }}-db:latest
          labels: ${{ steps.meta.outputs.labels }}
