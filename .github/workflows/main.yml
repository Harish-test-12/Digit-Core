name: Build and push Docker images

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated list of services to build (e.g., billing-service,collection-services)"
        required: false
        default: "billing-service,collection-services"

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    # Determine services dynamically
    outputs:
      services: ${{ steps.determine-services.outputs.services }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Determine services
        id: determine-services
        run: |
          if [ "${{ github.event.inputs.services }}" != "" ]; then
            echo "Using provided services: ${{ github.event.inputs.services }}"
            echo "${{ github.event.inputs.services }}" | tr ',' '\n' | jq -R . | jq -s . > services.json
          else
            echo "Using default services: billing-service,collection-services"
            echo '["billing-service", "collection-services"]' > services.json
          fi
          cat services.json
        shell: bash
        env:
          SERVICES: ${{ github.event.inputs.services }}
        outputs:
          services: ${{ steps.determine-services.outputs.services }}

  # Build and push jobs for each service
  build_images:
    needs: build_and_push
    strategy:
      matrix:
        service: ${{ fromJson(needs.build_and_push.outputs.services) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: harish7303/${{ matrix.service }}

      - name: Build and push Docker image (Main Service)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: build/maven/Dockerfile
          push: true
          tags: harish7303/${{ matrix.service }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            WORK_DIR=business-services/${{ matrix.service }}

      - name: Build and push Docker image (DB Service)
        if: matrix.service == 'collection-services' || matrix.service == 'billing-service'
        uses: docker/build-push-action@v4
        with:
          context: business-services/${{ matrix.service }}/src/main/resources/db
          file: business-services/${{ matrix.service }}/src/main/resources/db/Dockerfile
          push: true
          tags: harish7303/${{ matrix.service }}-db:latest
          labels: ${{ steps.meta.outputs.labels }}
