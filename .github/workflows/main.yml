name: Build Pipeline
on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
    inputs:
      folder:
        description: 'Select the folder which contains your services'
        required: true
        type: choice
        options:
          - core-services
          - business-services
      serviceName:
        description: 'Provide the service name you want to build'
        required: true
      dbMigration:
        description: Enable if you require DB migration for this service
        required: true
        type: boolean

jobs:
  Build:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      docker_image_tag: ${{ steps.build_image_tag.outputs.tag }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Extract branch name and commit hash
        id: extract_info
        run: |
          BRANCH=${GITHUB_REF##*/}
          COMMIT_HASH=$(git rev-parse --short HEAD)

          if [ -z "$BRANCH" ]; then
            BRANCH="default-branch"
          fi
          if [ -z "$COMMIT_HASH" ]; then
            COMMIT_HASH="no-commit"
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build_image_tag
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/maven/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.serviceName }}:${{ env.BRANCH }}-${{ env.COMMIT_HASH }}-${{ github.run_number }}
          build-args: WORK_DIR=${{ github.event.inputs.folder }}/${{ github.event.inputs.serviceName }}
        outputs:
          tag: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.serviceName }}:${{ env.BRANCH }}-${{ env.COMMIT_HASH }}-${{ github.run_number }}

  FetchDockerImage:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Docker Image
        run: |
          echo "Pulling image: ${{ needs.Build.outputs.docker_image_tag }}"
          docker pull ${{ needs.Build.outputs.docker_image_tag }}

      - name: Display Docker Images
        run: |
          echo "Listing all images..."
          docker images
